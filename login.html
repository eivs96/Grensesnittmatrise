<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Logg inn på Grensesnittmatrise.no">
    <meta name="theme-color" content="#0c6e70">
    <title>Logg inn – Grensesnittmatrise.no</title>
    <style>
        :root {
            --bg: #f3ede2;
            --panel: rgba(255, 252, 247, 0.94);
            --text: #1b2529;
            --muted: rgba(27, 37, 41, 0.72);
            --accent: #0c6e70;
            --accent-strong: #0a4d50;
            --accent-soft: #dff1ee;
            --error: #ab2220;
            --error-bg: #fff5f5;
            --shadow: 0 20px 50px rgba(28, 38, 40, 0.12);
            --radius-lg: 24px;
            --radius-md: 18px;
            --radius-sm: 14px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-brand {
            text-align: center;
            margin-bottom: 36px;
        }

        .login-brand-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            background: var(--accent);
            color: #fff;
            font-weight: 700;
            font-size: 1.2rem;
            border-radius: 16px;
            margin-bottom: 16px;
        }

        .login-brand h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
        }

        .login-brand p {
            color: var(--muted);
            font-size: 0.92rem;
            margin-top: 6px;
        }

        .login-card {
            background: var(--panel);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: 36px 32px;
            backdrop-filter: blur(10px);
        }

        .login-tabs {
            display: flex;
            gap: 4px;
            background: rgba(0, 0, 0, 0.04);
            border-radius: var(--radius-sm);
            padding: 4px;
            margin-bottom: 28px;
        }

        .login-tab {
            flex: 1;
            padding: 10px 16px;
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--muted);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .login-tab.active {
            background: #fff;
            color: var(--accent);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .login-form[hidden] { display: none; }

        .form-field label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }

        .form-field input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid rgba(0, 0, 0, 0.1);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--text);
            background: #fff;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .form-field input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        .form-field input::placeholder {
            color: rgba(0, 0, 0, 0.3);
        }

        .login-button {
            width: 100%;
            padding: 14px 20px;
            border: none;
            border-radius: var(--radius-sm);
            background: var(--accent);
            color: #fff;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 4px;
        }

        .login-button:hover {
            background: var(--accent-strong);
        }

        .login-button:active {
            transform: scale(0.98);
        }

        .login-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-error {
            background: var(--error-bg);
            color: var(--error);
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.88rem;
            font-weight: 500;
            display: none;
        }

        .login-error.visible {
            display: block;
        }

        .resend-link {
            color: var(--accent);
            cursor: pointer;
            text-decoration: underline;
            font-weight: 600;
        }

        .login-success {
            background: #e6f0ef;
            color: #206746;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.88rem;
            font-weight: 500;
            display: none;
        }

        .login-success.visible {
            display: block;
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.82rem;
            color: var(--muted);
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 28px 20px;
                border-radius: var(--radius-md);
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-brand">
            <div class="login-brand-icon">GM</div>
            <h1>Grensesnittmatrise</h1>
            <p>Teknisk grensesnittverktøy for byggeprosjekter</p>
        </div>

        <div class="login-card">
            <div class="login-tabs">
                <button class="login-tab active" id="tab-login" type="button">Logg inn</button>
                <button class="login-tab" id="tab-register" type="button">Opprett konto</button>
            </div>

            <div id="login-error" class="login-error"></div>
            <div id="login-success" class="login-success"></div>

            <form class="login-form" id="form-login" autocomplete="on">
                <div class="form-field">
                    <label for="login-email">E-post</label>
                    <input id="login-email" type="email" name="email" placeholder="din@epost.no" required autocomplete="email">
                </div>
                <div class="form-field">
                    <label for="login-password">Passord</label>
                    <input id="login-password" type="password" name="password" placeholder="Ditt passord" required autocomplete="current-password">
                </div>
                <button class="login-button" type="submit">Logg inn</button>
            </form>

            <form class="login-form" id="form-register" hidden autocomplete="on">
                <div class="form-field">
                    <label for="reg-name">Navn</label>
                    <input id="reg-name" type="text" name="name" placeholder="Ola Nordmann" required autocomplete="name">
                </div>
                <div class="form-field">
                    <label for="reg-email">E-post</label>
                    <input id="reg-email" type="email" name="email" placeholder="din@epost.no" required autocomplete="email">
                </div>
                <div class="form-field">
                    <label for="reg-password">Passord</label>
                    <input id="reg-password" type="password" name="password" placeholder="Minst 8 tegn" required minlength="8" autocomplete="new-password">
                </div>
                <div class="form-field">
                    <label for="reg-password-confirm">Bekreft passord</label>
                    <input id="reg-password-confirm" type="password" name="password_confirm" placeholder="Gjenta passord" required minlength="8" autocomplete="new-password">
                </div>
                <button class="login-button" type="submit">Opprett konto</button>
            </form>
        </div>

        <p class="login-footer">Grensesnittmatrise.no &mdash; Teknisk grensesnittverktøy</p>
    </div>

    <script>
        var tabLogin = document.getElementById("tab-login");
        var tabRegister = document.getElementById("tab-register");
        var formLogin = document.getElementById("form-login");
        var formRegister = document.getElementById("form-register");
        var errorBox = document.getElementById("login-error");
        var successBox = document.getElementById("login-success");

        function showError(msg) {
            errorBox.textContent = msg;
            errorBox.classList.add("visible");
            successBox.classList.remove("visible");
        }

        function showSuccess(msg) {
            successBox.textContent = msg;
            successBox.classList.add("visible");
            errorBox.classList.remove("visible");
        }

        function clearMessages() {
            errorBox.classList.remove("visible");
            successBox.classList.remove("visible");
        }

        tabLogin.addEventListener("click", function() {
            tabLogin.classList.add("active");
            tabRegister.classList.remove("active");
            formLogin.hidden = false;
            formRegister.hidden = true;
            clearMessages();
        });

        tabRegister.addEventListener("click", function() {
            tabRegister.classList.add("active");
            tabLogin.classList.remove("active");
            formRegister.hidden = false;
            formLogin.hidden = true;
            clearMessages();
        });

        formLogin.addEventListener("submit", async function(e) {
            e.preventDefault();
            clearMessages();

            var email = document.getElementById("login-email").value.trim();
            var password = document.getElementById("login-password").value;

            if (!email || !password) {
                showError("Fyll inn e-post og passord.");
                return;
            }

            var btn = formLogin.querySelector("button[type='submit']");
            btn.disabled = true;
            btn.textContent = "Logger inn...";

            try {
                var res = await fetch("/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email: email, password: password })
                });

                var data = await res.json();

                if (!res.ok) {
                    if (res.status === 403) {
                        errorBox.innerHTML = (data.error || "E-post ikke bekreftet.") +
                            ' <span class="resend-link" id="resend-verify">Send bekreftelse på nytt</span>';
                        errorBox.classList.add("visible");
                        successBox.classList.remove("visible");
                        document.getElementById("resend-verify").addEventListener("click", async function() {
                            this.textContent = "Sender...";
                            try {
                                await fetch("/auth/resend-verification", {
                                    method: "POST",
                                    headers: { "Content-Type": "application/json" },
                                    body: JSON.stringify({ email: email })
                                });
                                showSuccess("Bekreftelseslenke sendt! Sjekk innboksen din.");
                            } catch (e) {
                                showError("Kunne ikke sende e-post. Prøv igjen.");
                            }
                        });
                    } else {
                        showError(data.error || "Innlogging feilet.");
                    }
                    return;
                }

                window.location.href = "/app";
            } catch (err) {
                showError("Noe gikk galt. Prøv igjen.");
            } finally {
                btn.disabled = false;
                btn.textContent = "Logg inn";
            }
        });

        formRegister.addEventListener("submit", async function(e) {
            e.preventDefault();
            clearMessages();

            var name = document.getElementById("reg-name").value.trim();
            var email = document.getElementById("reg-email").value.trim();
            var password = document.getElementById("reg-password").value;
            var confirmPassword = document.getElementById("reg-password-confirm").value;

            if (!name || !email || !password) {
                showError("Fyll inn alle felt.");
                return;
            }

            if (password.length < 8) {
                showError("Passordet må ha minst 8 tegn.");
                return;
            }

            if (password !== confirmPassword) {
                showError("Passordene stemmer ikke overens.");
                return;
            }

            var btn = formRegister.querySelector("button[type='submit']");
            btn.disabled = true;
            btn.textContent = "Oppretter konto...";

            try {
                var res = await fetch("/auth/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name: name, email: email, password: password })
                });

                var data = await res.json();

                if (!res.ok) {
                    showError(data.error || "Registrering feilet.");
                    return;
                }

                if (data.needsVerification) {
                    showSuccess("Konto opprettet! Sjekk e-posten din for å bekrefte kontoen.");
                } else {
                    showSuccess("Konto opprettet! Du kan nå logge inn.");
                    tabLogin.click();
                    document.getElementById("login-email").value = email;
                    document.getElementById("login-password").focus();
                }
            } catch (err) {
                showError("Noe gikk galt. Prøv igjen.");
            } finally {
                btn.disabled = false;
                btn.textContent = "Opprett konto";
            }
        });
    </script>
</body>
</html>
